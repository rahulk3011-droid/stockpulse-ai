services:
  - type: web
    name: stockpulse-web
    runtime: python
    rootDir: website
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app

  - type: web
    name: stockpulse-dashboard
    runtime: python
    rootDir: Dashboard
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
