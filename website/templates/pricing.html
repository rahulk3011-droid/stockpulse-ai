<!DOCTYPE html>
<html>
<head>
    <title>StockPulse AI Pricing</title>

    <style>
        body {
            background: #0b1b34;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: #111f3d;
            padding: 20px;
            width: 260px;
            border-radius: 10px;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #1f2937;
            color: white;
            border: 1px solid #374151;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-secondary:hover {
            background: #111827;
        }
    </style>
</head>

<body>

<h1>StockPulse AI Pricing</h1>

<div class="container">

    <!-- FREE -->
    <div class="card">
        <h2>Free</h2>
        <p>Basic access</p>
    </div>

    <!-- PRO -->
    <div class="card">
        <h2>Pro Monthly</h2>
        <p>$29/month</p>

        <form method="POST" action="/billing/create-checkout-session">
            <input type="hidden" name="plan" value="pro_monthly">
            <button class="btn-primary">Checkout Pro</button>
        </form>
    </div>

    <!-- PREMIUM -->
    <div class="card">
        <h2>Premium Monthly</h2>
        <p>$99/month</p>

        <form method="POST" action="/billing/create-checkout-session">
            <input type="hidden" name="plan" value="premium_monthly">
            <button class="btn-primary">Checkout Premium</button>
        </form>
    </div>

</div>

<!-- BILLING PORTAL -->
<form method="POST" action="/billing/portal">
    <button class="btn-secondary">Open Billing Portal</button>
</form>

</body>
</html>
