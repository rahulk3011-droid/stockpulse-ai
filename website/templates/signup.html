{% extends "base.html" %}
{% block title %}Sign Up - StockPulse AI{% endblock %}
{% block content %}
<div class="auth-wrap">
    <form method="post" class="auth-card">
        <h1>Create your account</h1>
        <label>Email</label>
        <input type="email" name="email" required>
        <label>Password</label>
        <input type="password" name="password" required>
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required>
        <button class="btn btn-primary full-btn" type="submit">Create Account</button>
        <p class="small-center">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </form>
</div>
{% endblock %}
