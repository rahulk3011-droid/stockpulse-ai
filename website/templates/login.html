{% extends "base.html" %}
{% block title %}Login - StockPulse AI{% endblock %}
{% block content %}
<div class="auth-wrap">
    <form method="post" class="auth-card">
        <h1>Welcome back</h1>
        <label>Email</label>
        <input type="email" name="email" required>
        <label>Password</label>
        <input type="password" name="password" required>
        <button class="btn btn-primary full-btn" type="submit">Login</button>
        <p class="small-center">New here? <a href="{{ url_for('signup') }}">Create account</a></p>
    </form>
</div>
{% endblock %}
