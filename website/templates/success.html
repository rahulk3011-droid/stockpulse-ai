<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payment Success</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: #ffffff;
    }
    .wrap {
      max-width: 700px;
      margin: 80px auto;
      padding: 24px;
    }
    .card {
      background: #0d1b2a;
      border: 1px solid #1f2f45;
      border-radius: 16px;
      padding: 28px;
      text-align: center;
    }
    .ok {
      background: #13341d;
      color: #b9f2c7;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .warn {
      background: #4a3a18;
      color: #ffe09c;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    a {
      display: inline-block;
      margin: 8px;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }
    .primary {
      background: #2f80ed;
      color: white;
    }
    .dark {
      background: #243447;
      color: white;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      {% if premium %}
        <div class="ok">Payment received. Premium is active for {{ email }}.</div>
        <a href="/open-dashboard" class="primary">Open Dashboard</a>
      {% else %}
        <div class="warn">
          Payment page completed, but premium is not marked yet. Wait a few seconds for the webhook, then try again.
        </div>
        <a href="/" class="dark">Back to Website</a>
        <a href="/payment-success" class="primary">Refresh Status</a>
      {% endif %}
    </div>
  </div>
</body>
</html>
